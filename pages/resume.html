<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Md. Imtiyaz Hossain - Resume</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="icon" href="../images/img.jpg" type="image/jpg" sizes="16x16" />
    <link rel="stylesheet" href="../styles/custom.css" />
  </head>

  <body class="bg-light">
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
      <div class="container-lg">
        <a class="navbar-brand fw-bold" href="../"
          ><span class="text-primary">&lt;/</span> Md Imtiyaz
          <span class="text-primary">&gt;</span></a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="../">Home</a></li>
            <li class="nav-item">
              <a class="nav-link" href="#education">Education</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#experience">Experience</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#skills">Skills</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#certifications">Certifications</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#achievements">Achievements</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="py-5">
      <div id="app"></div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-4 mt-5">
      <div class="container-lg">
        <p class="mb-2">© 2024 MD Imtiyaz Hossain. All rights reserved.</p>
        <p class="text-muted">
          Software Engineer | Cyber Security Professional
        </p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      async function loadPage() {
        const route = location.hash.replace("#", "") || "education";
        let html = await fetch(`${route}.html`).then((r) => r.text());
        document.getElementById("app").innerHTML = html;
      }

      window.addEventListener("hashchange", loadPage);
      window.addEventListener("load", loadPage);
    </script>
  </body>
</html>
